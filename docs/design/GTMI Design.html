<style>
  /* hide scrollbars inside artboards for cleaner presentation */
  .gtmi-artboard { overflow: hidden; position: relative; }
  .gtmi-artboard > div { transform-origin: top left; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screen-rankings.jsx"></script>
<script type="text/babel" src="screen-rankings-v2.jsx"></script>
<script type="text/babel" src="screen-program.jsx"></script>
<script type="text/babel" src="screen-methodology.jsx"></script>
<script type="text/babel" src="screen-country-changes.jsx"></script>
<script type="text/babel" src="screen-internal.jsx"></script>

<script type="text/babel" data-presets="react">
  // Wrapper that fits a 1440-wide screen into a smaller artboard via scale.
  function ScaledScreen({ children, width = 1440, height = 900, scale = 0.5 }) {
    return (
      <div className="gtmi-artboard" style={{ width: width * scale, height: height * scale, background: 'var(--paper)' }}>
        <div style={{ width, transform: `scale(${scale})` }}>
          {children}
        </div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas
        title="GTMI — Front-end design system"
        subtitle="Editorial / institutional direction · One refined direction"
      >
        <DCSection id="overview" title="Public site — primary screens" subtitle="The 30/70 composite, rendered for sovereign clients.">
          <DCArtboard id="rankings-v2" label="01 · Landing v2 — full editorial flow" width={720} height={1400}>
            <ScaledScreen width={1440} height={2800} scale={0.5}>
              <RankingsScreenV2 />
            </ScaledScreen>
          </DCArtboard>
          <DCArtboard id="rankings" label="01a · Landing v1 (compact)" width={720} height={1100}>
            <ScaledScreen width={1440} height={2200} scale={0.5}>
              <RankingsScreen />
            </ScaledScreen>
          </DCArtboard>
          <DCArtboard id="program" label="02 · Programme detail + provenance drawer" width={720} height={1100}>
            <ScaledScreen width={1440} height={2200} scale={0.5}>
              <ProgramDetailScreen />
            </ScaledScreen>
          </DCArtboard>
        </DCSection>

        <DCSection id="trust" title="Trust & methodology" subtitle="Falsifiability is the product. These pages are the proof.">
          <DCArtboard id="methodology" label="03 · Methodology" width={720} height={1100}>
            <ScaledScreen width={1440} height={2200} scale={0.5}>
              <MethodologyScreen />
            </ScaledScreen>
          </DCArtboard>
        </DCSection>

        <DCSection id="exploration" title="Country profile" subtitle="Cross-programme view, anchored on the radar.">
          <DCArtboard id="country" label="04 · Country (Switzerland)" width={720} height={900}>
            <ScaledScreen width={1440} height={1800} scale={0.5}>
              <CountryScreen />
            </ScaledScreen>
          </DCArtboard>
        </DCSection>

        <DCSection id="internal" title="Internal tools — TTR Group only" subtitle="Not exposed publicly. Editorial review queue and changes audit.">
          <DCArtboard id="review" label="I-01 · Review value (internal)" width={720} height={900}>
            <ScaledScreen width={1440} height={1800} scale={0.5}>
              <ReviewValueScreen />
            </ScaledScreen>
          </DCArtboard>
          <DCArtboard id="changes" label="I-02 · Changes audit (internal)" width={720} height={1100}>
            <ScaledScreen width={1440} height={2200} scale={0.5}>
              <ChangesScreenInternal />
            </ScaledScreen>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
