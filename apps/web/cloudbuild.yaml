# Cloud Build config for @gtmi/web → Cloud Run.
# Build context: the monorepo root. Dockerfile: apps/web/Dockerfile.
#
# This file describes the BUILD PIPELINE. The TRIGGER that fires this
# pipeline on push to `main` lives in Cloud Console → Cloud Build →
# Triggers → `gtmi-web-main` (project gtmi-494008, region europe-west1).
# Recreating the trigger? See docs/runbook.md.
#
# 2026-04-30 — webhook flake recovery: when Cloud Build's GitHub
# fetcher caches a "Couldn't read commit" 503 on a fresh push, both
# `gcloud builds triggers run` and `git push --force-with-lease` of an
# empty commit fail to retrigger (empty commits don't match the
# includedFiles filter; gcloud hits the same cached negative). The
# reliable recovery is a one-character change to any file in scope.
#
# The trigger watches these globs only — a docs-only commit will NOT
# fire a 6-minute Docker rebuild. Update both lists in lockstep when
# adding a new build input:
#
#   apps/web/**
#   packages/db/**
#   packages/scoring/**
#   packages/extraction/**
#   packages/shared/**
#   pnpm-lock.yaml
#   pnpm-workspace.yaml
#   package.json
#   .npmrc
#
# Manual fallback (no trigger needed):
#   apps\web\deploy.cmd      (Windows, from a developer machine)
# or:
#   gcloud builds submit --config apps/web/cloudbuild.yaml .

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          -f apps/web/Dockerfile \
          --build-arg NEXT_PUBLIC_APP_URL="$$NEXT_PUBLIC_APP_URL" \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID" \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest" \
          .
    secretEnv:
      - NEXT_PUBLIC_APP_URL

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      # Phase 3.8 — bumped 60→300 so long-running cohort rescores
      # (~30-60s steady state, occasional bursts to 2-3min when an
      # entire cohort is recomputed) don't 504 the public landing
      # page when they share an instance with a /review action.
      # Combined with the rescore-actions.ts single-flight lock,
      # this gives the engine enough headroom to drain without
      # bricking other routes.
      - '--timeout=300'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--allow-unauthenticated'
      - '--set-secrets=DATABASE_URL=gtmi-web-database-url:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/gtmi-web-public-app-url/versions/latest
      env: NEXT_PUBLIC_APP_URL

substitutions:
  _REGION: europe-west1
  _REPO: gtmi
  _SERVICE: gtmi-web

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
