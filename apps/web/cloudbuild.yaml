# Cloud Build config for @gtmi/web → Cloud Run.
# Build context: the monorepo root. Dockerfile: apps/web/Dockerfile.
#
# This file describes the BUILD PIPELINE. The TRIGGER that fires this
# pipeline on push to `main` lives in Cloud Console → Cloud Build →
# Triggers → `gtmi-web-main` (project gtmi-494008, region europe-west1).
# Recreating the trigger? See docs/runbook.md.
#
# The trigger watches these globs only — a docs-only commit will NOT
# fire a 6-minute Docker rebuild. Update both lists in lockstep when
# adding a new build input:
#
#   apps/web/**
#   packages/db/**
#   packages/scoring/**
#   packages/extraction/**
#   packages/shared/**
#   pnpm-lock.yaml
#   pnpm-workspace.yaml
#   package.json
#   .npmrc
#
# Manual fallback (no trigger needed):
#   apps\web\deploy.cmd      (Windows, from a developer machine)
# or:
#   gcloud builds submit --config apps/web/cloudbuild.yaml .

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          -f apps/web/Dockerfile \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$$NEXT_PUBLIC_SUPABASE_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
          --build-arg NEXT_PUBLIC_APP_URL="$$NEXT_PUBLIC_APP_URL" \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID" \
          -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest" \
          .
    secretEnv:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - NEXT_PUBLIC_APP_URL

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--allow-unauthenticated'
      - '--set-secrets=DATABASE_URL=gtmi-web-database-url:latest,SUPABASE_URL=gtmi-web-supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=gtmi-web-supabase-service-role-key:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/gtmi-web-public-supabase-url/versions/latest
      env: NEXT_PUBLIC_SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/gtmi-web-public-supabase-anon-key/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY
    - versionName: projects/$PROJECT_ID/secrets/gtmi-web-public-app-url/versions/latest
      env: NEXT_PUBLIC_APP_URL

substitutions:
  _REGION: europe-west1
  _REPO: gtmi
  _SERVICE: gtmi-web

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
